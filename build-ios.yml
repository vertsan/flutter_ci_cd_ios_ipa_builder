name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'API URL to write into .env file'
        required: true
        default: 'http://32.236.105.9'
        type: string
      app_name:
        description: 'App name used for the .ipa filename'
        required: true
        default: 'sbku_app'
        type: string
      artifact_name:
        description: 'Name of the uploaded artifact'
        required: true
        default: 'sbku_app_ipa'
        type: string

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
        working-directory: frontend
      - name: Create .env file for CI
        run: |
          echo "API_URL=${{ inputs.api_url }}" > .env
          echo ".env created successfully:"
          cat .env
        working-directory: frontend
      - run: flutter build ios --no-codesign --release
        working-directory: frontend
      - run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r ${{ inputs.app_name }}.ipa Payload/
        working-directory: frontend
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: frontend/${{ inputs.app_name }}.ipa
